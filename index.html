  const uomDictionary = {
    "AMP": "Ampoule",
    "VL": "Vial",
    "PC": "Piece",
    "PAC": "Pack",
    "RL": "Roll",
    "TUB": "Tube",
    "BOX": "Box",
    "BOT": "Bottle",
    "PR": "Pair",
    "PAD": "Pad",
    "VSET": "Set"
  };

  const searchInput = document.getElementById('searchInput');
  const resultsContainer = document.getElementById('resultsContainer');
  
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("expandedImg");
  const captionText = document.getElementById("modalCaption");

  function displayResults(items) {
    resultsContainer.innerHTML = '';
    
    if(items.length === 0) {
        resultsContainer.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; padding-top: 20px; color: white; font-size: 18px; text-shadow: 1px 1px 2px black;">No items found.</p>';
        return;
    }

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';
      
      const imageFileName = item.code + '.jpg';

      card.style.cursor = 'pointer';
      card.onclick = function() {
        modal.style.display = "block";
        modalImg.src = imageFileName;
        
        modalImg.onerror = function() {
            this.src = 'https://via.placeholder.com/600x400?text=No+Image+Found';
        };
        
        let alternativeText = "";
        if (item.alt) {
            alternativeText = `<div class="modal-alt-item"><strong style="color:white;">Note:</strong> ${item.alt}</div>`;
        }

        captionText.innerHTML = `<span class="modal-item-code">Code: ${item.code}</span><br>${item.desc}${alternativeText}`;
      };

      const fullUomName = uomDictionary[item.uom] || item.uom;
      
      const altBadge = item.isAlt ? '<div class="badge-alt">Alternative Item</div>' : '';
      
      let altDetailsBox = '';
      if (item.alt) {
        let cleanAltText = item.alt;
        altDetailsBox = `
          <div style="background-color: #fff3cd; color: #856404; font-size: 11px; padding: 6px; margin-top: 8px; border-radius: 4px; border-left: 4px solid #ffc107; text-align: left; line-height: 1.3;">
            <strong>Backup Available:</strong><br>${cleanAltText}
          </div>
        `;
      }

      card.innerHTML = `
        <img class="item-image" src="${imageFileName}" alt="${item.desc}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=No+Image+Found'">
        <div class="item-code">Code: ${item.code}</div>
        ${altBadge}
        <div class="item-desc">${item.desc}</div>
        <div class="item-uom">Unit of Measure: ${fullUomName}</div>
        ${altDetailsBox}
      `;
      resultsContainer.appendChild(card);
    });
  }

  function closeModal() {
    modal.style.display = "none";
  }

  window.onclick = function(event) {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }

  displayResults(inventory);

  searchInput.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    const filteredItems = inventory.filter(item => 
      item.desc.toLowerCase().includes(searchTerm) || 
      item.code.includes(searchTerm)
    );
    displayResults(filteredItems);
  });
