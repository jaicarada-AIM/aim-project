    background-position: center;
    background-attachment: fixed;

  }

  .header-container {
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

    font-family: 'Montserrat', sans-serif;
    color: white;
    text-align: center;
    font-size: 85px;

    letter-spacing: 4px;
    margin-top: 0;
    margin-bottom: 25px;
    text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
    line-height: 1.1;
  }

  .banner-subtitle {
    display: block;
    font-size: 30px; 
    font-weight: 700; 
    color: #4da6ff; 
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    margin-top: 5px;
  }

  .search-container { 
    max-width: 800px; 
    margin: 0 auto; 
    position: relative; 
    z-index: 1;
  }

  input[type="text"].search-bar { 
    width: 100%; 
    padding: 18px; 
    font-size: 16px; 
    border: 3px solid #ee4d2d; 
    border-radius: 8px; 
    box-sizing: border-box; 
    outline: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  input[type="text"].search-bar:focus {
    box-shadow: 0 0 12px rgba(238, 77, 45, 0.9);
  }

  .results-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
    gap: 15px; 
    max-width: 1000px; 
    margin: 0 auto 40px; 
    padding: 0 20px;
  }
  .item-card { 
    background: white; 
    border: 1px solid #e0e0e0; 
    border-radius: 6px; 
    padding: 15px; 
    text-align: center; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
    transition: transform 0.2s; 
    position: relative;
  }
  .item-card:hover { 
    transform: translateY(-5px); 
    border-color: #ee4d2d; 
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  .item-image { 
    width: 100%; 
    height: 150px; 
    object-fit: contain; 
    margin-bottom: 10px; 
    background-color: #fafafa; 
    border-radius: 4px;
  }
  
  .badge-alt {
    background-color: #ff9800;
    color: white;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: bold;
    border-radius: 12px;
    display: inline-block;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .item-code { 
    font-size: 12px; 
    color: #888; 
    margin-bottom: 5px; 
  }
  .item-desc { 
    font-size: 13px; 
    font-weight: bold; 
    color: #333; 
    margin-bottom: 10px; 
    height: 45px; 
    overflow: hidden; 
  }
  .item-uom { 
    font-size: 13px; 
    color: #ee4d2d; 
    font-weight: bold; 
  }
  .modal {
    display: none; 
    position: fixed; 
    z-index: 10000; 
    padding-top: 50px; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    background-color: rgba(0,0,0,0.85); 
  }
  .modal-content {
    margin: auto;
    display: block;
    max-width: 80%;
    max-height: 70vh;
    background-color: white;
    padding: 20px;
    border-radius: 8px;
  }
  #modalCaption {
    margin: auto;
    display: block;
    width: 80%;
    text-align: center;
    color: white;
    padding: 15px 0;
    font-size: 18px;
    line-height: 1.5;
  }
  .modal-item-code {
    font-size: 22px;
    color: #ee4d2d;
    font-weight: bold;
  }
  .modal-alt-item {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
    color: #ffd54f;
    font-size: 16px;
  }
  .close-btn {
    position: absolute;
    top: 15px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
  }
  .close-btn:hover,
  .close-btn:focus {
    color: #ee4d2d;
    text-decoration: none;
    cursor: pointer;
  }

  const uomDictionary = {
    "AMP": "Ampoule",
    "VL": "Vial",
    "PC": "Piece",
    "PAC": "Pack",
    "RL": "Roll",
    "TUB": "Tube",
    "BOX": "Box",
    "BOT": "Bottle",
    "PR": "Pair",
    "PAD": "Pad",
    "VSET": "Set"
  };

  const searchInput = document.getElementById('searchInput');
  const resultsContainer = document.getElementById('resultsContainer');
  
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("expandedImg");
  const captionText = document.getElementById("modalCaption");

  function displayResults(items) {
    resultsContainer.innerHTML = '';
    
    if(items.length === 0) {
        resultsContainer.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; padding-top: 20px; color: white; font-size: 18px; text-shadow: 1px 1px 2px black;">No items found.</p>';
        return;
    }

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';
      
      const imageFileName = item.code + '.png';

      card.style.cursor = 'pointer';
      card.onclick = function() {
        modal.style.display = "block";
        modalImg.src = imageFileName;
        
        modalImg.onerror = function() {
            this.src = 'https://via.placeholder.com/600x400?text=No+Image+Found';
        };
        
        let alternativeText = "";
        if (item.alt) {
            alternativeText = `<div class="modal-alt-item"><strong style="color:white;">Note:</strong> ${item.alt}</div>`;
        }

        captionText.innerHTML = `<span class="modal-item-code">Code: ${item.code}</span><br>${item.desc}${alternativeText}`;
      };

      const fullUomName = uomDictionary[item.uom] || item.uom;
      
      const altBadge = item.isAlt ? '<div class="badge-alt">Alternative Item</div>' : '';

     card.innerHTML = `
        <img class="item-image" src="${imageFileName}" alt="${item.desc}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=No+Image+Found'">
        <div class="item-code">Code: ${item.code}</div>
        ${altBadge}
        <div class="item-desc">${item.desc}</div>
        <div class="item-uom">Unit of Measure: ${fullUomName}</div>
      `;
      resultsContainer.appendChild(card);
    });
  }

  function closeModal() {
    modal.style.display = "none";
  }

  window.onclick = function(event) {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }

  displayResults(inventory);

  searchInput.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    const filteredItems = inventory.filter(item => 
      item.desc.toLowerCase().includes(searchTerm) || 
      item.code.includes(searchTerm)
    );
    displayResults(filteredItems);
  });
