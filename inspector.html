<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.I.M. | E-Cart Inspector Audit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

  body { 
    font-family: Arial, sans-serif; 
    margin: 0;
    padding: 0;
    background-color: #f4f7f6;
  }

  .header-container {
    background-color: #1a365d;
    padding: 30px 20px;
    text-align: center;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .banner-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 45px; 
    margin: 0;
    letter-spacing: 2px;
  }

  .banner-subtitle {
    font-size: 20px; 
    color: #4da6ff; 
    margin-top: 5px;
  }

  #resultsContainer {
    padding: 20px;
  }

  /* --- INSPECTOR PANEL & LEGEND --- */
  .inspector-header-panel {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin: 0 auto 20px auto;
    max-width: 1100px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap; /* Allows legend to wrap on smaller screens */
    gap: 10px;
    font-size: 12px;
    font-weight: bold;
    padding-top: 15px;
    border-top: 1px solid #eee;
  }

  .legend-item {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* --- OFFICIAL ST. LUKE'S STATUS COLORS --- */
  .row-present    { background-color: #ffffff; }
  .row-lacking    { background-color: #f8d7da !important; color: #721c24; } /* Red */
  .row-expired    { background-color: #fff3cd !important; color: #856404; } /* Yellow */
  .row-damaged    { background-color: #fad7a1 !important; color: #8a6d3b; } /* Orange */
  .row-turnin     { background-color: #cce5ff !important; color: #004085; } /* Blue */
  .row-notable    { background-color: #d6d8db !important; color: #383d41; } /* Dark Gray */
  .row-unlabelled { background-color: #e2d9f3 !important; color: #4a235a; } /* Purple */
  .row-excess     { background-color: #d4edda !important; color: #155724; } /* Green */

  /* --- TABLE STYLES --- */
  .inspector-drawer-title {
    background-color: #4da6ff;
    color: white;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px 8px 0 0;
    font-weight: bold;
    font-size: 16px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .inspector-table {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto 20px auto;
    background: white;
    border-collapse: collapse;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  .inspector-table th, .inspector-table td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: left;
    font-size: 14px;
    transition: background-color 0.3s;
  }

  .inspector-table th { background-color: #ee4d2d; color: white; font-weight: bold; }
  .inspector-table tr:hover { opacity: 0.95; }
  
  .status-select {
    padding: 6px;
    border-radius: 4px;
    font-weight: bold;
    border: 1px solid #ccc;
    cursor: pointer;
    width: 145px;
  }

  .input-field {
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
    text-align: center;
  }

  .btn {
    padding: 10px 15px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    color: white;
    transition: 0.2s;
  }
  .btn-print { background-color: #007bff; }
  .btn-print:hover { background-color: #0056b3; }
  .btn-export { background-color: #28a745; }
  .btn-export:hover { background-color: #1e7e34; }

  /* --- PRINT STYLES --- */
  @media print {
    body { background: white !important; }
    .header-container, .btn, .legend-row { display: none !important; }
    .inspector-header-panel { box-shadow: none; border: 1px solid #000; padding: 10px; }
    .inspector-table, .inspector-drawer-title { box-shadow: none; border: 1px solid #000; page-break-inside: avoid; }
    .inspector-table th { color: black !important; background-color: #f1f1f1 !important; border: 1px solid #000; }
    .inspector-table td { border: 1px solid #000; }
    input, select { border: none; background: transparent; appearance: none; -webkit-appearance: none; font-weight: bold;}
  }
</style>
</head>
<body>

<div id="mainApp">
  <div class="header-container">
    <h1 class="banner-title">A.I.M. AUDIT</h1>
    <span class="banner-subtitle">Official Inspector Mode</span>
  </div>

  <div id="resultsContainer"></div>
</div>

<script>
  // --- INVENTORY DATABASE (FULL CART STRUCTURE) ---
  const inventory = [
    // --- INTUBATION KIT ---
    { code: "23003347", desc: "Laryngoscope batteries AA (extra)", uom: "PC", cart: ["Combined", "Adult", "Neonatal"], drawer: "0 - Intubation Kit" },
    { code: "34040379", desc: "Laryngoscope bulb #4 WA", uom: "PC", cart: ["Combined", "Adult"], drawer: "0 - Intubation Kit" },
    
    // --- DRAWER 1 (MEDICATIONS) ---
    { code: "42964311", desc: "ATROPINE (HIZON) 1 MG/1 ML AMP", uom: "AMP", cart: ["Combined", "Adult", "Neonatal"], drawer: "Drawer 1 - Medications" },
    { code: "44000038", desc: "SOD. BICARBONATE 8.4%(ATLANTIC) 50ML AMP", uom: "AMP", cart: ["Combined", "Adult"], drawer: "Drawer 1 - Medications" },
    
    // --- DRAWER 2 (AIRWAY & RESPIRATORY) ---
    { code: "80200008", desc: "AIRWAY NASAL SIZE 7.0 FR. 28", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 2 - Airway" },
    { code: "86000143", desc: "ENDO TUBE STANDARD SIZE 2.0", uom: "PC", cart: ["Combined", "Neonatal"], drawer: "Drawer 2 - Airway" },
    
    // --- DRAWER 3 (IV SUPPLIES & SYRINGES) ---
    { code: "83900200", desc: "IV CATH AUTOGUARD G-18", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 3 - IV Supplies" },
    { code: "85701002", desc: "SYRINGE 5CC W/ NEEDLE LUER LOCK", uom: "PC", cart: ["Combined", "Adult", "Neonatal"], drawer: "Drawer 3 - IV Supplies" },

    // --- DRAWER 4 (TUBING & PROCEDURAL SUPPLIES) ---
    { code: "86000011", desc: "SUCTION CONNECTING TUBE FR. 25 X 210CM", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 4 - Tubing & Supplies" },
    { code: "84000014", desc: "OXYGEN CONNECTING TUBE", uom: "PC", cart: ["Combined", "Adult", "Neonatal"], drawer: "Drawer 4 - Tubing & Supplies" },

    // --- DRAWER 5 (FLUIDS & LARGE SUPPLIES) ---
    { code: "44000094", desc: "LR (EURO-MED) 1 L SOL'N", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 5 - Fluids" },
    
    // --- DRAWER 6 (SPECIAL EQUIPMENT & EXTERNAL) ---
    { code: "80500026", desc: "AMBUBAG ADULT", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 6 - Equipment" },
    { code: "82700096", desc: "ECG ELECTRODES ADULT RED DOT 50/PAC", uom: "PC", cart: ["Combined", "Adult"], drawer: "Drawer 6 - Equipment" }
  ];

  const uomDictionary = { "AMP": "Ampoule", "VL": "Vial", "PC": "Piece", "PAC": "Pack", "RL": "Roll", "TUB": "Tube", "BOX": "Box", "BOT": "Bottle", "PR": "Pair", "PAD": "Pad", "VSET": "Set" };
  const resultsContainer = document.getElementById('resultsContainer');

  // Load Combined Cart on startup
  window.onload = function() {
    renderInspectorChecklist('Combined');
  };

  function renderInspectorChecklist(selectedCart) {
    let html = `
      <div class="inspector-header-panel">
        <div class="controls-row">
          <div>
            <h2 style="margin:0; color:#333;">E-Cart Audit Checklist</h2>
            <p style="margin:5px 0 0; color:#666; font-size:14px;">Input QTY and Expiry Dates. Status colors update automatically.</p>
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <select id="cartSelector" onchange="renderInspectorChecklist(this.value)" style="padding: 10px; border-radius: 6px; border: 2px solid #1a365d; font-size: 16px; font-weight: bold;">
              <option value="Combined" ${selectedCart === 'Combined' ? 'selected' : ''}>Combined E-Cart (57 Units)</option>
              <option value="Adult" ${selectedCart === 'Adult' ? 'selected' : ''}>Adult E-Cart (14 Units)</option>
              <option value="Neonatal" ${selectedCart === 'Neonatal' ? 'selected' : ''}>Neonatal E-Cart (3 Units)</option>
            </select>
            <button class="btn btn-export" onclick="exportToCSV('${selectedCart}')">📥 Export to Excel</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Print</button>
          </div>
        </div>
        
        <div class="legend-row">
          <div class="legend-item" style="background: #ffffff;">✅ Present (Default)</div>
          <div class="legend-item" style="background: #f8d7da; color: #721c24;">❌ Lacking</div>
          <div class="legend-item" style="background: #fff3cd; color: #856404;">⚠️ Expired</div>
          <div class="legend-item" style="background: #fad7a1; color: #8a6d3b;">🛠️ Damaged</div>
          <div class="legend-item" style="background: #cce5ff; color: #004085;">📥 For Turn In</div>
          <div class="legend-item" style="background: #d6d8db; color: #383d41;">⛔ Not Able to Turn In</div>
          <div class="legend-item" style="background: #e2d9f3; color: #4a235a;">🏷️ Unlabelled</div>
          <div class="legend-item" style="background: #d4edda; color: #155724;">➕ Excess</div>
        </div>
      </div>
    `;

    const cartItems = inventory.filter(item => item.cart && item.cart.includes(selectedCart) && !item.isAlt);
    const groupedByDrawer = cartItems.reduce((acc, item) => {
      let drawerName = item.drawer || "Unassigned Items";
      if (!acc[drawerName]) acc[drawerName] = [];
      acc[drawerName].push(item);
      return acc;
    }, {});

    const sortedDrawers = Object.keys(groupedByDrawer).sort();

    sortedDrawers.forEach(drawer => {
      const items = groupedByDrawer[drawer];
      html += `
        <div class="inspector-drawer-title">📁 ${drawer}</div>
        <table class="inspector-table" id="table-${drawer.replace(/\s+/g, '-')}">
          <tr>
            <th style="width: 155px;">Audit Status</th>
            <th style="width: 80px; text-align: center;">Act. QTY</th>
            <th style="width: 130px;">Expiry Date</th>
            <th>Item Code</th>
            <th>Description</th>
            <th>UOM</th>
          </tr>
      `;
      items.forEach(item => {
        const fullUomName = uomDictionary[item.uom] || item.uom;
        html += `
          <tr class="row-present data-row">
            <td>
              <select class="status-select" onchange="updateRowColor(this)">
                <option value="Present">✅ Present</option>
                <option value="Lacking">❌ Lacking</option>
                <option value="Expired">⚠️ Expired</option>
                <option value="Damaged">🛠️ Damaged</option>
                <option value="For Turn In">📥 For Turn In</option>
                <option value="Not Able to Turn In">⛔ Not Able to Turn In</option>
                <option value="Unlabelled">🏷️ Unlabelled</option>
                <option value="Excess">➕ Excess</option>
              </select>
            </td>
            <td style="text-align: center;">
              <input type="number" class="input-field qty-input" min="0" placeholder="Qty" style="width: 60px;">
            </td>
            <td>
              <input type="date" class="input-field expiry-input" style="width: 110px;">
            </td>
            <td class="code-cell"><strong>${item.code}</strong></td>
            <td class="desc-cell">${item.desc}</td>
            <td class="uom-cell">${fullUomName}</td>
          </tr>
        `;
      });
      html += '</table>';
    });

    resultsContainer.innerHTML = html;
  }

  // --- CHANGE ROW COLOR BASED ON NEW ST. LUKE'S DROPDOWN SELECTION ---
  function updateRowColor(selectElement) {
    const tr = selectElement.closest('tr');
    const status = selectElement.value;
    
    // Strip all potential color classes first
    tr.classList.remove('row-present', 'row-lacking', 'row-expired', 'row-damaged', 'row-turnin', 'row-notable', 'row-unlabelled', 'row-excess');
    
    // Apply the specific color class based on the selected St. Luke's legend
    if (status === 'Present') tr.classList.add('row-present');
    if (status === 'Lacking') tr.classList.add('row-lacking');
    if (status === 'Expired') tr.classList.add('row-expired');
    if (status === 'Damaged') tr.classList.add('row-damaged');
    if (status === 'For Turn In') tr.classList.add('row-turnin');
    if (status === 'Not Able to Turn In') tr.classList.add('row-notable');
    if (status === 'Unlabelled') tr.classList.add('row-unlabelled');
    if (status === 'Excess') tr.classList.add('row-excess');
  }

  // --- EXPORT TO EXCEL (CSV) FUNCTION ---
  function exportToCSV(cartType) {
    const rows = document.querySelectorAll('.data-row');
    let csvContent = "data:text/csv;charset=utf-8,";
    
    const date = new Date().toLocaleDateString();
    const time = new Date().toLocaleTimeString();
    csvContent += `E-Cart Audit Report\nCart Type: ${cartType}\nDate: ${date} ${time}\n\n`;
    csvContent += "Drawer,Status,Actual QTY,Expiry Date,Item Code,Description,UOM\n";

    rows.forEach(row => {
      const drawerTitle = row.closest('table').previousElementSibling.innerText.replace('📁 ', '');
      const status = row.querySelector('.status-select').value;
      const qty = row.querySelector('.qty-input').value || "0";
      const expiry = row.querySelector('.expiry-input').value || "N/A";
      const code = row.querySelector('.code-cell').innerText;
      const desc = `"${row.querySelector('.desc-cell').innerText}"`; 
      const uom = row.querySelector('.uom-cell').innerText;

      csvContent += `${drawerTitle},${status},${qty},${expiry},${code},${desc},${uom}\n`;
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Audit_${cartType}_${date.replace(/\//g, '-')}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>
</body>
</html>
