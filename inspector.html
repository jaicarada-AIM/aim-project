<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

  body { 
    font-family: Arial, sans-serif; 
    margin: 0;
    padding: 0;
    background-color: #f4f7f6;
  }

  .header-container {
    background-color: #1a365d;
    padding: 30px 20px;
    text-align: center;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .banner-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 45px; 
    margin: 0;
    letter-spacing: 2px;
  }

  .banner-subtitle {
    font-size: 20px; 
    color: #4da6ff; 
    margin-top: 5px;
  }

  #resultsContainer {
    padding: 20px;
  }

  /* --- INSPECTOR PANEL & LEGEND --- */
  .inspector-header-panel {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin: 0 auto 20px auto;
    max-width: 1150px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 12px;
    font-weight: bold;
    padding-top: 15px;
    border-top: 1px solid #eee;
  }

  .legend-item {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* --- OFFICIAL ST. LUKE'S STATUS COLORS --- */
  .row-present    { background-color: #ffffff; }
  .row-lacking    { background-color: #f8d7da !important; color: #721c24; } 
  .row-expired    { background-color: #fff3cd !important; color: #856404; } 
  .row-damaged    { background-color: #fad7a1 !important; color: #8a6d3b; } 
  .row-turnin     { background-color: #cce5ff !important; color: #004085; } 
  .row-notable    { background-color: #d6d8db !important; color: #383d41; } 
  .row-unlabelled { background-color: #e2d9f3 !important; color: #4a235a; } 
  .row-excess     { background-color: #d4edda !important; color: #155724; } 

  /* --- TABLE STYLES --- */
  .inspector-drawer-title {
    background-color: #4da6ff;
    color: white;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px 8px 0 0;
    font-weight: bold;
    font-size: 16px;
    max-width: 1150px;
    margin-left: auto;
    margin-right: auto;
  }

  .inspector-table {
    width: 100%;
    max-width: 1150px;
    margin: 0 auto 20px auto;
    background: white;
    border-collapse: collapse;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  .inspector-table th, .inspector-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
    font-size: 14px;
    transition: background-color 0.3s;
  }

  .inspector-table th { background-color: #ee4d2d; color: white; font-weight: bold; }
  .inspector-table tr:hover { opacity: 0.95; }
  
  .status-select {
    padding: 6px;
    border-radius: 4px;
    font-weight: bold;
    border: 1px solid #ccc;
    cursor: pointer;
    width: 145px;
  }

  .input-field {
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
    text-align: center;
  }

  .expected-qty-badge {
    background-color: #eee;
    padding: 4px 8px;
    border-radius: 12px;
    font-weight: bold;
    color: #333;
    display: inline-block;
  }

  .btn {
    padding: 10px 15px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    color: white;
    transition: 0.2s;
  }
  .btn-print { background-color: #007bff; }
  .btn-print:hover { background-color: #0056b3; }
  .btn-export { background-color: #28a745; }
  .btn-export:hover { background-color: #1e7e34; }

  /* --- PRINT STYLES --- */
  @media print {
    body { background: white !important; }
    .header-container, .btn, .legend-row { display: none !important; }
    .inspector-header-panel { box-shadow: none; border: 1px solid #000; padding: 10px; }
    .inspector-table, .inspector-drawer-title { box-shadow: none; border: 1px solid #000; page-break-inside: avoid; }
    .inspector-table th { color: black !important; background-color: #f1f1f1 !important; border: 1px solid #000; }
    .inspector-table td { border: 1px solid #000; }
    input, select { border: none; background: transparent; appearance: none; -webkit-appearance: none; font-weight: bold;}
  }
</style>

          <div class="legend-item" style="background: #cce5ff; color: #004085;">📥 For Turn In</div>
          <div class="legend-item" style="background: #d6d8db; color: #383d41;">⛔ Not Able to Turn In</div>
          <div class="legend-item" style="background: #e2d9f3; color: #4a235a;">🏷️ Unlabelled</div>
          <div class="legend-item" style="background: #d4edda; color: #155724;">➕ Excess</div>
        </div>
      </div>
    `;

    const cartItems = inventory.filter(item => item.cart && item.cart.includes(selectedCart));
    const groupedByDrawer = cartItems.reduce((acc, item) => {
      let drawerName = item.drawer || "Unassigned Items";
      if (!acc[drawerName]) acc[drawerName] = [];
      acc[drawerName].push(item);
      return acc;
    }, {});

    const sortedDrawers = Object.keys(groupedByDrawer).sort();

    sortedDrawers.forEach(drawer => {
      const items = groupedByDrawer[drawer];
      html += `
        <div class="inspector-drawer-title">📁 ${drawer}</div>
        <table class="inspector-table" id="table-${drawer.replace(/\s+/g, '-')}">
          <tr>
            <th style="width: 155px;">Audit Status</th>
            <th style="width: 70px; text-align: center;">Exp. QTY</th>
            <th style="width: 80px; text-align: center;">Act. QTY</th>
            <th style="width: 130px;">Expiry Date</th>
            <th>Item Code</th>
            <th>Description</th>
            <th>UOM</th>
          </tr>
      `;
      items.forEach(item => {
        const fullUomName = uomDictionary[item.uom] || item.uom;
        html += `
          <tr class="row-present data-row" data-expected="${item.qty}">
            <td>
              <select class="status-select" onchange="manualColorOverride(this)">
                <option value="Present">✅ Present</option>
                <option value="Lacking">❌ Lacking</option>
                <option value="Expired">⚠️ Expired</option>
                <option value="Damaged">🛠️ Damaged</option>
                <option value="For Turn In">📥 For Turn In</option>
                <option value="Not Able to Turn In">⛔ Not Able to Turn In</option>
                <option value="Unlabelled">🏷️ Unlabelled</option>
                <option value="Excess">➕ Excess</option>
              </select>
            </td>
            <td style="text-align: center;">
              <span class="expected-qty-badge">${item.qty}</span>
            </td>
            <td style="text-align: center;">
              <input type="number" class="input-field qty-input" min="0" placeholder="Qty" style="width: 60px;" oninput="autoCalculateStatus(this)">
            </td>
            <td>
              <input type="date" class="input-field expiry-input" style="width: 110px;" oninput="autoCalculateStatus(this)">
            </td>
            <td class="code-cell"><strong>${item.code}</strong></td>
            <td class="desc-cell">${item.desc}</td>
            <td class="uom-cell">${fullUomName}</td>
          </tr>
        `;
      });
      html += '</table>';
    });

    resultsContainer.innerHTML = html;
  }

  // --- SMART AUTOMATION LOGIC ---
  function autoCalculateStatus(element) {
    const tr = element.closest('tr');
    const select = tr.querySelector('.status-select');
    const actualQtyStr = tr.querySelector('.qty-input').value;
    const expiryStr = tr.querySelector('.expiry-input').value;
    const expectedQty = parseInt(tr.dataset.expected) || 0;
    
    const currentStatus = select.value;
    if (["Damaged", "For Turn In", "Not Able to Turn In", "Unlabelled"].includes(currentStatus) && element.classList.contains('qty-input')) {
      return; 
    }

    let calculatedStatus = "Present";

    if (expiryStr) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const expDate = new Date(expiryStr);
      if (expDate < today) {
        calculatedStatus = "Expired";
      }
    }

    if (calculatedStatus !== "Expired" && actualQtyStr !== "") {
      const actualQty = parseInt(actualQtyStr);
      if (actualQty < expectedQty) {
        calculatedStatus = "Lacking";
      } else if (actualQty > expectedQty) {
        calculatedStatus = "Excess";
      }
    }

    select.value = calculatedStatus;
    manualColorOverride(select);
  }

  // --- MANUAL COLOR OVERRIDE ---
  function manualColorOverride(selectElement) {
    const tr = selectElement.closest('tr');
    const status = selectElement.value;
    
    tr.classList.remove('row-present', 'row-lacking', 'row-expired', 'row-damaged', 'row-turnin', 'row-notable', 'row-unlabelled', 'row-excess');
    
    if (status === 'Present') tr.classList.add('row-present');
    if (status === 'Lacking') tr.classList.add('row-lacking');
    if (status === 'Expired') tr.classList.add('row-expired');
    if (status === 'Damaged') tr.classList.add('row-damaged');
    if (status === 'For Turn In') tr.classList.add('row-turnin');
    if (status === 'Not Able to Turn In') tr.classList.add('row-notable');
    if (status === 'Unlabelled') tr.classList.add('row-unlabelled');
    if (status === 'Excess') tr.classList.add('row-excess');
  }

  function exportToCSV(cartType) {
    const rows = document.querySelectorAll('.data-row');
    let csvContent = "data:text/csv;charset=utf-8,";
    const date = new Date().toLocaleDateString();
    const time = new Date().toLocaleTimeString();
    
    csvContent += `E-Cart Audit Report\nCart Type: ${cartType}\nDate: ${date} ${time}\n\n`;
    csvContent += "Drawer,Audit Status,Expected QTY,Actual QTY,Expiry Date,Item Code,Description,UOM\n";

    rows.forEach(row => {
      const drawerTitle = row.closest('table').previousElementSibling.innerText.replace('📁 ', '');
      const status = row.querySelector('.status-select').value;
      const expectedQty = row.dataset.expected;
      const actualQty = row.querySelector('.qty-input').value || "0";
      const expiry = row.querySelector('.expiry-input').value || "N/A";
      const code = row.querySelector('.code-cell').innerText;
      const desc = `"${row.querySelector('.desc-cell').innerText}"`; 
      const uom = row.querySelector('.uom-cell').innerText;

      csvContent += `${drawerTitle},${status},${expectedQty},${actualQty},${expiry},${code},${desc},${uom}\n`;
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Audit_${cartType}_${date.replace(/\//g, '-')}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>
